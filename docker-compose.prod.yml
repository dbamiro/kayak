# Production compose — see docs/PRODUCTION_DEPLOY.md
# Requires .env with DATABASE_URL, JWT_SECRET, Stripe keys, POSTGRES_PASSWORD, etc.

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kayak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kayak_prod}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - kayak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kayak} -d ${POSTGRES_DB:-kayak_prod}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Kayak DMV}
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  jobs:
    build: .
    env_file:
      - .env
    environment:
      APP_ENV: production
    command:
      - sh
      - -c
      - |
        while true; do
          python -m jobs.run_scheduled
          sleep 86400
        done
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - jobs

volumes:
  kayak_pg_data:
